<!DOCTYPE html>
<html lang="ku">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YUSSEF_SURCHI Mini App</title>
    <style>
        body { background-color: #000; color: #FFD700; font-family: 'Arial', sans-serif; text-align: center; margin: 0; padding: 20px; }
        .container { border: 2px solid #008000; padding: 20px; border-radius: 20px; background: #0a0a0a; box-shadow: 0 0 20px #008000; }
        h1 { color: #fff; text-transform: uppercase; letter-spacing: 2px; }
        .time { font-size: 2.5rem; font-weight: bold; margin: 20px 0; color: #FFD700; }
        .status { color: #fff; font-size: 1.1rem; margin: 10px 0; }
        button { background: #008000; color: #fff; border: none; padding: 15px 30px; font-size: 1.2rem; cursor: pointer; border-radius: 50px; transition: 0.3s; margin-top: 20px; }
        button:hover { background: #00ff00; color: #000; }
        footer { margin-top: 40px; color: #FFD700; font-weight: bold; }
        #loader { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 999; }
        .bar { width: 80%; height: 10px; background: #333; border-radius: 5px; overflow: hidden; margin-top: 20px; }
        .progress { width: 0%; height: 100%; background: #008000; }
    </style>
</head>
<body>

<div id="loader">
    <h1>LOADING...</h1>
    <div class="bar"><div id="progress" class="progress"></div></div>
</div>

<div id="main-content" style="display:none;">
    <div class="container">
        <h1>YUSSEF SURCHI</h1>
        <div id="clock" class="time">00:00:00</div>
        <div id="date" style="font-size: 1.2rem;">00-00-0000</div>
        <div class="status">Online: ⚡ 245 | Subscribers: 💎 3,890</div>
        
        <button onclick="toggleMusic()">🎵 لێدانا سترانا یاماجی</button>
        <audio id="mySong" loop>
            <!-- ل جهێ ڤێ لینکی، تو دشێی فایلا mp3 یا خوە دابنێی -->
            <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
        </audio>
    </div>
    <footer>MADE BY YUSSEF_SURCHI</footer>
</div>

<script>
    // Loading animation
    let p = 0;
    let load = setInterval(() => {
        p += 2; // ئەڤە دێ ٥ چرکا کێشیت
        document.getElementById('progress').style.width = p + '%';
        if(p >= 100) {
            clearInterval(load);
            document.getElementById('loader').style.display = 'none';
            document.getElementById('main-content').style.display = 'block';
        }
    }, 100);

    // Iraq Time
    function updateTime() {
        const now = new Date().toLocaleString("en-US", {timeZone: "Asia/Baghdad"});
        document.getElementById('clock').innerText = new Date(now).toLocaleTimeString('ku-IQ', {hour12: false});
        document.getElementById('date').innerText = new Date(now).toLocaleDateString('ku-IQ');
    }
    setInterval(updateTime, 1000);

    // Music control
    function toggleMusic() {
        let music = document.getElementById("mySong");
        if (music.paused) { music.play(); } else { music.pause(); }
    }
</script>
</body>
</html>
