<!DOCTYPE html>
<html lang="ku">
<head>
    <meta charset="UTF-8">
    <title>PUBG Mobile Lobby Fake</title>
    <style>
        body { margin: 0; padding: 0; background: #1a1a1a; color: white; font-family: sans-serif; overflow: hidden; }
        .lobby-container { width: 100vw; height: 100vh; display: flex; flex-direction: column; justify-content: space-between; padding: 20px; box-sizing: border-box; }
        
        /* Header UI */
        .top-bar { display: flex; justify-content: flex-end; gap: 15px; }
        .currency { background: #333; padding: 5px 15px; border-radius: 20px; border: 1px solid #ffd700; }
        
        /* Character Placeholder */
        .character-zone { flex-grow: 1; display: flex; justify-content: center; align-items: center; }
        .character { width: 200px; height: 400px; background: url('https://via.placeholder.com/200x400') center/cover; border: 2px solid #555; }
        
        /* Start Button */
        .start-btn { width: 200px; padding: 20px; background: #ffcc00; color: black; font-weight: bold; text-align: center; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>

<div class="lobby-container">
    <div class="top-bar">
        <div class="currency">100,000,000 UC</div>
        <div class="currency">999,999 BP</div>
    </div>

    <div class="character-zone">
        <div class="character"></div> </div>

    <div class="start-btn">START</div>
</div>

</body>
</html>
