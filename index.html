<!DOCTYPE html>
<html lang="ku">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PUBG Mobile Lobby UI</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; font-family: sans-serif; }
        
        /* دانانا وێنەیێ PUBG */
        .lobby-bg {
            width: 100vw; height: 100vh;
            background-image: url('image.png'); /* ڤێ وێنەیێ دگەل فایلێ خوە د هەمان فۆڵدەرێ دا دانی */
            background-size: cover;
            background-position: center;
            position: relative;
        }

        /* ستایلێ دوگمەیان */
        .btn {
            position: absolute;
            cursor: pointer;
            color: white;
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid #ffcc00;
            padding: 15px 30px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 8px;
            text-transform: uppercase;
        }

        .btn:hover { background: rgba(255, 204, 0, 0.8); color: black; }
        
        /* جهێن دوگمەیان */
        .btn-start { bottom: 50px; left: 50px; width: 220px; text-align: center; }
        .btn-inventory { bottom: 50px; right: 50px; }
    </style>
</head>
<body>

<div class="lobby-bg">
    <!-- دوگمەیا Start -->
    <div class="btn btn-start" onclick="action('START')">START</div>
    
    <!-- دوگمەیا Inventory -->
    <div class="btn btn-inventory" onclick="action('INVENTORY')">INVENTORY</div>
</div>

<script>
    function action(type) {
        if(type === 'START') {
            alert('یاری دهێتە دەستپێکرن...');
        } else if(type === 'INVENTORY') {
            alert('Inventory دهێتە ڤەکرن...');
        }
    }
</script>

</body>
</html>
