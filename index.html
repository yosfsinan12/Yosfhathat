<!DOCTYPE html>
<html lang="ku">
<head>
    <meta charset="UTF-8">
    <title>YUSSEF_SURCHI App</title>
    <style>
        body { background: #000; color: #FFD700; text-align: center; font-family: sans-serif; padding: 10px; }
        .box { border: 2px solid #008000; padding: 15px; border-radius: 20px; background: #111; margin-bottom: 10px; }
        button { background: #008000; color: #fff; padding: 10px 20px; border-radius: 50px; border: none; cursor: pointer; }
        .stat { color: #fff; font-size: 1.1rem; margin-top: 10px; }
    </style>
</head>
<body>

<div class="box">
    <h1>YUSSEF SURCHI</h1>
    <div id="clock" style="font-size: 1.5rem;">00:00:00</div>
    <div id="date">00-00-0000</div>
</div>

<div class="box">
    <h3>قورئانا پیرۆز</h3>
    <audio controls>
        <source src="https://server8.mp3quran.net/afs/001.mp3" type="audio/mpeg">
    </audio>
</div>

<div class="box">
    <h3>یاریا کلیکێ</h3>
    <button onclick="countClick()">Click Me: <span id="clicks">0</span></button>
</div>

<div class="box">
    <h3>ئامارێن بۆتێ</h3>
    <button onclick="getStats()">نیشادانا ئاماران</button>
    <div id="stats" class="stat">...</div>
</div>

<script>
    // Time & Date
    function updateTime() {
        const now = new Date().toLocaleString("en-US", {timeZone: "Asia/Baghdad"});
        document.getElementById('clock').innerText = new Date(now).toLocaleTimeString('ku-IQ');
        document.getElementById('date').innerText = new Date(now).toLocaleDateString('ku-IQ');
    }
    setInterval(updateTime, 1000);

    // Click Game
    let c = 0;
    function countClick() { c++; document.getElementById('clicks').innerText = c; }

    // Stats Logic
    function getStats() {
        const token = "8834271734:AAEaFLuYIqyluV-zqeYdKYzHBEgYLUegvjQ"; 
        const chatId = "@snaptik1_video_bot"; // ناڤێ کەناڵێ یان گروپێ خوە ل ڤێرێ بنڤیسە
        const url = `https://api.telegram.org/bot${token}/getChatMembersCount?chat_id=${chatId}`;
        
        fetch(url)
            .then(res => res.json())
            .then(data => {
                document.getElementById('stats').innerText = "هژمارا ئەندامان: " + data.result;
            })
            .catch(err => document.getElementById('stats').innerText = "هەلە: بۆتێ تە ل وێ کەناڵێ نینە!");
    }
</script>
</body>
</html>
