<!DOCTYPE html>
<html lang="ku">
<head>
    <meta charset="UTF-8">
    <title>PUBG Mobile Lobby</title>
    <style>
        body { margin: 0; padding: 0; background: #000; color: #fff; font-family: Arial, sans-serif; overflow: hidden; }
        .lobby { width: 100vw; height: 100vh; background: url('image.png') center/cover; position: relative; }
        
        /* ستایلێ پشکێ ئایدیێ */
        .profile-id { position: absolute; top: 20px; left: 80px; font-size: 20px; color: #ffd700; font-weight: bold; }
        
        /* ستایلێ دوگمەیان */
        .btn { position: absolute; cursor: pointer; padding: 15px 30px; background: rgba(0,0,0,0.6); border: 2px solid #ffd700; border-radius: 5px; color: white; text-transform: uppercase; }
        .btn:hover { background: #ffd700; color: #000; }
        
        .start { bottom: 50px; left: 50px; width: 200px; text-align: center; }
        .inventory { bottom: 50px; right: 50px; }
    </style>
</head>
<body>

<div class="lobby">
    <!-- پشکێ نیشاندانا ئایدیێ -->
    <div class="profile-id" id="userID">ID: 5123456789</div>

    <div class="btn start" onclick="doAction('START')">START</div>
    <div class="btn inventory" onclick="doAction('INVENTORY')">INVENTORY</div>
</div>

<script>
    // لێرە ئایدیێ خوە ل سەر وێبسایتێ نیشان بدە
    document.getElementById('userID').innerText = "ID: 5123456789";

    function doAction(action) {
        if(action === 'START') {
            alert('یاری هاتە دەستپێکرن!');
        } else if(action === 'INVENTORY') {
            alert('ئینڤێنتۆری هاتە ڤەکرن!');
        }
    }
</script>

</body>
</html>
